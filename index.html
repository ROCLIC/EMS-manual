<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMS Manual - Sistema de Gestión Documental</title>
<!-- Google Fonts: Inter & Montserrat -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<!-- Font Awesome para iconos -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --primary:#3b82f6;
    --primary-dark:#2563eb;
    --primary-glow:rgba(59,130,246,0.5);
    --bg-body:#0f1419;
    --bg-card:rgba(30,40,60,0.95);
    --bg-sidebar:#1a2332;
    --text-main:#ffffff;
    --text-muted:#b0c4de;
    --border:rgba(255,255,255,0.15);
    --success:#10b981;
    --danger:#ef4444;
    --transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Inter', sans-serif;
    background-color:var(--bg-body);
    color:var(--text-main);
    overflow:hidden;
    height:100vh;
}

/* ===== LOGIN MODERNO ===== */
.login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top right, rgba(59,130,246,0.15), transparent),
                radial-gradient(circle at bottom left, rgba(16,185,129,0.1), transparent);
    position:relative;
}

.login-card{
    background:rgba(30,50,80,0.98);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:2px solid rgba(59,130,246,0.3);
    border-radius:24px;
    width:440px;
    padding:48px;
    box-shadow:0 25px 50px -12px rgba(0,0,0,0.7), 0 0 40px rgba(59,130,246,0.2);
    text-align:center;
    z-index:10;
}

.ems-logo-container{
    width:80px;
    height:80px;
    background:white;
    border-radius:20px;
    margin:0 auto 24px;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 30px var(--primary-glow);
}

.ems-logo-container i{
    font-size:40px;
    color:var(--danger);
}

.login-card h1{
    font-family:'Montserrat', sans-serif;
    font-size:32px;
    margin-bottom:8px;
    background:linear-gradient(to right, #fff, #94a3b8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.login-card p{
    color:var(--text-muted);
    font-size:14px;
    margin-bottom:32px;
}

.input-group{
    margin-bottom:20px;
    text-align:left;
}

.input-group label{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--text-muted);
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.input-wrapper{
    position:relative;
}

.input-wrapper i{
    position:absolute;
    left:16px;
    top:50%;
    transform:translateY(-50%);
    color:var(--text-muted);
}

.input-wrapper input{
    width:100%;
    padding:14px 16px 14px 48px;
    background:rgba(0,0,0,0.3);
    border:1px solid var(--border);
    border-radius:12px;
    color:white;
    font-size:15px;
    transition:var(--transition);
}

.input-wrapper input:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(59,130,246,0.15);
}

.btn-primary{
    width:100%;
    padding:14px;
    background:var(--primary);
    color:white;
    border:none;
    border-radius:12px;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    transition:var(--transition);
    margin-top:10px;
}

.btn-primary:hover{
    background:var(--primary-dark);
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(59,130,246,0.3);
}

.btn-secondary{
    width:100%;
    padding:14px;
    background:transparent;
    color:var(--text-main);
    border:1px solid var(--border);
    border-radius:12px;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:var(--transition);
    margin-top:12px;
}

.btn-secondary:hover{
    background:rgba(255,255,255,0.05);
}

/* ===== APP LAYOUT ===== */
.app-container{
    display:grid;
    grid-template-columns:280px 1fr;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    background:var(--bg-sidebar);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    padding:24px;
    height:100vh;
    overflow:hidden;
}

.app-logo{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:40px;
}

.app-logo i{
    color:var(--danger);
    font-size:24px;
}

.app-logo span{
    font-family:'Montserrat', sans-serif;
    font-weight:800;
    font-size:20px;
    letter-spacing:-0.5px;
}

.nav-section{
    flex:1;
    overflow-y:auto;
    overflow-x:hidden;
    min-height:0;
    padding-right:12px;
    scroll-behavior:smooth;
    margin-right:-12px;
}

.nav-section::-webkit-scrollbar{
    width:10px;
}

.nav-section::-webkit-scrollbar-track{
    background:transparent;
}

.nav-section::-webkit-scrollbar-thumb{
    background:linear-gradient(to bottom, rgba(59,130,246,0.7), rgba(16,185,129,0.7));
    border-radius:8px;
    min-height:40px;
}

.nav-section::-webkit-scrollbar-thumb:hover{
    background:linear-gradient(to bottom, rgba(59,130,246,1), rgba(16,185,129,1));
    box-shadow:0 0 15px rgba(59,130,246,0.4);
}

/* Para Firefox */
.nav-section{
    scrollbar-width:thin;
    scrollbar-color:rgba(59,130,246,0.7) transparent;
}

.sidebar-btn{
    width:100%;
    padding:12px;
    margin-bottom:8px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    font-size:14px;
    transition:var(--transition);
}

.btn-add-cat{ background:rgba(16,185,129,0.1); color:var(--success); }
.btn-add-cat:hover{ background:rgba(16,185,129,0.2); }

.btn-add-doc{ background:rgba(59,130,246,0.1); color:var(--primary); }
.btn-add-doc:hover{ background:rgba(59,130,246,0.2); }

.cat-item{
    margin-bottom:4px;
}

.cat-header{
    padding:10px 12px;
    border-radius:8px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    transition:var(--transition);
}

.cat-header:hover{ background:rgba(255,255,255,0.05); }
.cat-header.active{ background:rgba(59,130,246,0.1); color:var(--primary); }

.cat-name{ font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px; }

.doc-list{ margin-left:24px; margin-top:4px; border-left:1px solid var(--border); padding-left:12px; }

.doc-item{
    padding:8px 12px;
    font-size:13px;
    color:var(--text-muted);
    cursor:pointer;
    border-radius:6px;
    margin-bottom:2px;
    transition:var(--transition);
}

.doc-item:hover{ color:var(--text-main); background:rgba(255,255,255,0.03); }
.doc-item.active{ color:white; background:var(--primary); font-weight:600; }

/* MAIN CONTENT */
.main-content{
    display:flex;
    flex-direction:column;
    background:#0f1419;
}

.top-bar{
    padding:16px 32px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(20,30,50,0.9);
    backdrop-filter:blur(10px);
    position:relative;
    z-index:100;
}

.search-bar{
    position:relative;
    width:400px;
}

.search-bar i{ position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--text-muted); }
.search-bar input{
    width:100%;
    padding:10px 16px 10px 44px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    border-radius:10px;
    color:white;
    font-size:14px;
}

.user-profile{
    display:flex;
    align-items:center;
    gap:12px;
    position:relative;
}

.user-meta{ text-align:right; }
.user-meta h4{ font-size:14px; font-weight:700; }
.user-meta p{ font-size:11px; color:var(--text-muted); display:none; }

.avatar{
    cursor:pointer;
    transition:var(--transition);
    width:40px;
    height:40px;
    border-radius:10px;
    background:linear-gradient(45deg, var(--primary), var(--success));
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:800;
    color:white;
    background-size:cover;
    background-position:center;
    font-size:0;
    overflow:hidden;
    position:relative;
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.avatar:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px rgba(59,130,246,0.5);
}

/* Previsualización de avatar en tamaño normal */
.avatar-preview {
    position: fixed;
    top: 50%;
    right: 32px;
    transform: translateY(-50%);
    width: 200px;
    height: 200px;
    background-color: var(--bg-card);
    border: 2px solid var(--primary);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(59,130,246,0.2);
    z-index: 10000;
    display: none;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    animation: slideDown 0.3s ease-out;
    pointer-events: none;
    overflow: hidden;
}

/* Responsive para pantallas más pequeñas */
@media (max-width: 1200px) {
    .avatar-preview {
        width: 180px;
        height: 180px;
        right: 24px;
    }
}

@media (max-width: 768px) {
    .avatar-preview {
        width: 160px;
        height: 160px;
        right: 16px;
    }
}

@media (max-width: 480px) {
    .avatar-preview {
        width: 140px;
        height: 140px;
        right: 12px;
    }
}

.user-profile:hover .avatar-preview {
    display: block;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}



.avatar-text{
    font-size:16px;
}

.btn-logout{
    padding:8px;
    color:var(--text-muted);
    cursor:pointer;
    transition:var(--transition);
}

.btn-logout:hover{ color:var(--danger); }

/* EDITOR AREA */
.editor-container{
    flex:1;
    padding:32px;
    display:flex;
    flex-direction:column;
    gap:20px;
    overflow:hidden;
    position:relative;
    min-height:0;
}

/* WELCOME SCREEN */
.welcome-screen{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center, rgba(59,130,246,0.12) 0%, transparent 70%);
    z-index:5;
    transition:var(--transition);
}

.welcome-content{
    text-align:center;
    animation:fadeInUp 0.8s ease-out;
}

.welcome-logo{
    font-size:120px;
    color:#ef4444;
    margin-bottom:24px;
    opacity:1;
}

.welcome-content h2{
    font-family:'Montserrat', sans-serif;
    font-size:28px;
    color:var(--text-main);
    margin-bottom:12px;
    letter-spacing:1px;
}

.welcome-content p{
    color:var(--text-muted);
    font-size:16px;
    max-width:400px;
    line-height:1.6;
}

@keyframes fadeInUp{
    from{ opacity:0; transform:translateY(20px); }
    to{ opacity:1; transform:translateY(0); }
}

.editor-toolbar{
    background:var(--bg-sidebar);
    padding:12px;
    border-radius:12px;
    border:1px solid var(--border);
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
}

.tool-btn{
    width:36px;
    height:36px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:transparent;
    border:none;
    color:var(--text-muted);
    border-radius:8px;
    cursor:pointer;
    transition:var(--transition);
}

.tool-btn:hover{ background:rgba(255,255,255,0.05); color:white; }

.tool-select{
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    color:white;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
    outline:none;
}

.tool-sep{ width:1px; height:24px; background:var(--border); margin:0 4px; }

.btn-save{ background:var(--success) !important; color:white !important; padding:0 16px !important; width:auto !important; font-weight:700; font-size:12px; }
.btn-delete{ background:rgba(239,68,68,0.1) !important; color:var(--danger) !important; padding:0 16px !important; width:auto !important; font-weight:700; font-size:12px; }

.editor-paper{
    flex:1;
    background:rgba(25,35,55,0.95);
    border-radius:16px;
    border:1px solid rgba(59,130,246,0.2);
    padding:40px;
    overflow-y:auto;
    overflow-x:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.3), inset 0 0 20px rgba(59,130,246,0.05);
    font-size:16px;
    line-height:1.8;
    outline:none;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
    will-change:scroll-position;
}

.editor-paper::-webkit-scrollbar{
    width:10px;
}

.editor-paper::-webkit-scrollbar-track{
    background:rgba(0,0,0,0.2);
    border-radius:0 16px 16px 0;
}

.editor-paper::-webkit-scrollbar-thumb{
    background:linear-gradient(to bottom, rgba(59,130,246,0.5), rgba(16,185,129,0.5));
    border-radius:10px;
    border:2px solid rgba(25,35,55,0.95);
}

.editor-paper::-webkit-scrollbar-thumb:hover{
    background:linear-gradient(to bottom, rgba(59,130,246,0.8), rgba(16,185,129,0.8));
}

/* Para Firefox */
.editor-paper{
    scrollbar-width:thin;
    scrollbar-color:rgba(59,130,246,0.5) rgba(0,0,0,0.2);
}

.editor-paper:empty::before{
    content: 'Comienza a escribir tu documento EMS...';
    color: var(--text-muted);
}

/* ESTILOS PARA IMÁGENES INTERACTIVAS */
.img-wrapper {
    display: inline-block;
    position: relative;
    margin: 10px;
    line-height: 0;
    user-select: none;
    -webkit-user-drag: none;
    cursor: grab;
    transition: box-shadow 0.2s;
    border: 2px solid transparent;
    vertical-align: middle;
}

.img-wrapper:active {
    cursor: grabbing;
}

.img-wrapper.selected {
    border: 2px dashed var(--primary);
    box-shadow: 0 0 15px var(--primary-glow);
}

.img-wrapper img {
    display: block;
    max-width: 100%;
    height: auto;
    pointer-events: none; /* Para que el wrapper maneje los eventos */
}

.resize-handle {
    position: absolute;
    width: 10px;
    height: 10px;
    background-color: var(--primary);
    border: 2px solid white;
    border-radius: 50%;
    display: none;
    z-index: 10;
}

.img-wrapper.selected .resize-handle {
    display: block;
}

.handle-nw { top: -6px; left: -6px; cursor: nw-resize; }
.handle-ne { top: -6px; right: -6px; cursor: ne-resize; }
.handle-sw { bottom: -6px; left: -6px; cursor: sw-resize; }
.handle-se { bottom: -6px; right: -6px; cursor: se-resize; }

/* VISTA PREVIA DE IMAGEN AL PASAR EL MOUSE */
.img-preview-overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    width: auto;
    height: auto;
    max-width: 60vw;
    max-height: 70vh;
    background: rgba(15, 20, 25, 0.95);
    border: 2px solid var(--primary);
    border-radius: 12px;
    z-index: 10000;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.9);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.img-preview-overlay.active {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

.img-preview-overlay img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

/* RESPONSIVE */
@media (max-width: 1024px) {
    .app-container { grid-template-columns: 1fr; }
    .sidebar { display: none; }
}
</style>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="login" class="login">
    <div class="login-card">
        <div class="ems-logo-container">
            <i class="fa-solid fa-star-of-life"></i>
        </div>
        <h1>EMS Manual</h1>
        <p id="loginSubtitle">Gestión Documental de Emergencias</p>
        
        <div class="input-group">
            <label>Correo Electrónico</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input id="emailInput" type="email" placeholder="nombre@ejemplo.com">
            </div>
        </div>
        
        <div class="input-group">
            <label>Contraseña</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input id="passwordInput" type="password" placeholder="••••••••">
            </div>
        </div>
        
        <div class="input-group" id="nameGroup" style="display:none;">
            <label>Nombre Completo</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input id="nameInput" type="text" placeholder="Tu nombre">
            </div>
        </div>
        
        <button id="mainBtn" class="btn-primary" onclick="handleAuth()">Iniciar Sesión</button>
        <button id="toggleBtn" class="btn-secondary" onclick="toggleRegister()">Crear una cuenta</button>
    </div>
</div>

<!-- APLICACIÓN PRINCIPAL -->
<div id="app" style="display:none">
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="app-logo">
                <i class="fa-solid fa-star-of-life"></i>
                <span>EMS MANUAL</span>
            </div>
            
            <div class="buttons">
                <button class="sidebar-btn btn-add-cat" onclick="nuevaCategoria()">
                    <i class="fa-solid fa-folder-plus"></i> Nueva Categoría
                </button>
                <button class="sidebar-btn btn-add-doc" onclick="nuevoDocumento()">
                    <i class="fa-solid fa-file-circle-plus"></i> Nuevo Documento
                </button>
            </div>
            
            <div class="nav-section" id="lista">
                <!-- Las categorías se cargarán aquí -->
            </div>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Buscar en documentos..." oninput="buscarPorTitulo(this.value)">
                </div>
                
                <div class="user-profile">
                    <div class="user-meta">
                        <h4 id="nombreUsuario" onclick="cambiarNombreUsuario()" style="cursor: pointer; transition: var(--transition);" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'" title="Haz clic para cambiar tu nombre">Usuario</h4>
                        <p id="emailUsuario">usuario@ems.com</p>
                    </div>
                    <div style="position: relative;">
                        <div class="avatar" id="userAvatar" onclick="abrirCambiarAvatar()" title="Haz clic para cambiar tu imagen"><span class="avatar-text">U</span></div>
                        <div id="avatarPreview" class="avatar-preview"></div>
                    </div>
                    <div class="btn-logout" onclick="cerrarSesion()" title="Cerrar Sesión">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </div>
                </div>
            </header>

            <div class="editor-container">
                <!-- Pantalla de Bienvenida -->
                <div id="welcomeScreen" class="welcome-screen">
                    <div class="welcome-content">
                        <div class="welcome-logo">
                            <i class="fa-solid fa-star-of-life"></i>
                        </div>
                        <h2>SISTEMA EMS MANUAL</h2>
                        <p>Selecciona una categoría o crea un nuevo documento para comenzar a gestionar tu información.</p>
                    </div>
                </div>

                <div class="editor-toolbar" id="toolbar" style="display:none">
                    <button class="tool-btn" onclick="cmd('bold')" title="Negrita"><i class="fa-solid fa-bold"></i></button>
                    <button class="tool-btn" onclick="cmd('italic')" title="Cursiva"><i class="fa-solid fa-italic"></i></button>
                    <button class="tool-btn" onclick="cmd('underline')" title="Subrayado"><i class="fa-solid fa-underline"></i></button>
                    
                    <div class="tool-sep"></div>
                    
                    <select class="tool-select" onchange="cmd('fontName', this.value)">
                        <option value="">Fuente</option>
                        <option value="Inter">Inter</option>
                        <option value="Arial">Arial</option>
                        <option value="Calibri">Calibri</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Tahoma">Tahoma</option>
                    </select>
                    
                    <select class="tool-select" onchange="setFontSize(this.value)">
                        <option value="">Tamaño</option>
                        <option value="10">10px</option>
                        <option value="12">12px</option>
                        <option value="14">14px</option>
                        <option value="16">16px</option>
                        <option value="18">18px</option>
                        <option value="24">24px</option>
                        <option value="32">32px</option>
                    </select>
                    
                    <div class="tool-sep"></div>

<script type="module">

  const firebaseConfig = {

  const lista = document.getElementById("lista");

  // ========= AUTENTICACIÓN =========
  window.toggleRegister = function(){

  window.handleAuth = function(){
      if(isRegisterMode) crearUsuario();
      else login();

  window.crearUsuario = function(){
      const email = document.getElementById("emailInput").value.trim();
      const pass = document.getElementById("passwordInput").value.trim();
      const name = document.getElementById("nameInput").value.trim();
      
      if(!email || !pass || !name) return alert("Por favor, completa todos los campos");
      if(pass.length < 6) return alert("La contraseña debe tener al menos 6 caracteres");

      createUserWithEmailAndPassword(auth, email, pass)
          .then((userCredential) => {
              const user = userCredential.user;
              setDoc(doc(collection(db, 'usuarios'), user.uid), {
                  nombre: name,
                  email: email,
                  documentos: {},
                  fechaRegistro: new Date()
              });
          })
          .catch(err => alert("Error: " + err.message));
  }

  window.login = function(){
      const email = document.getElementById("emailInput").value.trim();
      const pass = document.getElementById("passwordInput").value.trim();
      if(!email || !pass) return alert("Ingresa tus credenciales");
      signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Error: " + err.message));
  }

  window.cerrarSesion = function(){
      signOut(auth).then(() => location.reload());
  }

  onAuthStateChanged(auth, user => {
      if (user) {
          currentUser = user;
          iniciarApp();
      } else {
          currentUser = null;
          document.getElementById("login").style.display="flex";
          document.getElementById("app").style.display="none";
      }
  });

  async function iniciarApp(){
      document.getElementById("login").style.display="none";
      document.getElementById("app").style.display="block";
      document.getElementById("welcomeScreen").style.display="flex";

      const userDocRef = doc(collection(db, 'usuarios'), currentUser.uid);
      
      // Primera carga forzada
      try {
          const { getDoc } = await import("https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js");
          const initialSnap = await getDoc(userDocRef);
          if (initialSnap.exists()) {
              const userData = initialSnap.data();
              actualizarInterfazUsuario(userData);
              data = userData.documentos || {};
          }
      } catch (e) { console.error("Error en carga inicial:", e); }

      // Escucha en tiempo real para actualizaciones posteriores
      onSnapshot(userDocRef, (docSnap) => {
          if (docSnap.exists()) {
              const userData = docSnap.data();
              actualizarInterfazUsuario(userData);
              data = userData.documentos || {};
          }
          render();
      });
  }

  function actualizarInterfazUsuario(userData) {
      // PRIORIDAD 1: Leer de localStorage (respaldo más rápido)
      const nombreLocal = localStorage.getItem(`ems_username_${currentUser.uid}`);
      
      // PRIORIDAD 2: Si no hay en localStorage, usar Firebase
      // PRIORIDAD 3: Si tampoco hay en Firebase, usar email
      const nombreValido = nombreLocal 
          ? nombreLocal 
          : (userData.nombre && typeof userData.nombre === 'string' && userData.nombre.trim() !== "") 
              ? userData.nombre.trim() 
              : currentUser.email.split('@')[0];
      
      userProfileData = {
          nombre: nombreValido,
          email: userData.email,
          avatarUrl: userData.avatarUrl,
          fechaRegistro: userData.fechaRegistro
      };
      
      // Guardar en localStorage si no estaba
      if (!nombreLocal && nombreValido !== currentUser.email.split('@')[0]) {
          localStorage.setItem(`ems_username_${currentUser.uid}`, nombreValido);
      }
      
      const name = nombreValido;
      document.getElementById("nombreUsuario").textContent = name;
      document.getElementById("emailUsuario").textContent = userData.email || currentUser.email;
      
      const avatarText = document.getElementById("userAvatar").querySelector(".avatar-text"); 
      if(avatarText) avatarText.textContent = name.charAt(0).toUpperCase(); 
      cargarAvatarGuardado(userData);
  }

  // ========= LÓGICA DE LA APP (RESTAURADA) =========
  window.render = function(){
      lista.innerHTML = "";
      
      // Obtener todas las categorías
      const categorias = Object.keys(data);
      let huboCambiosDeOrden = false;
      
      // Asegurarse de que todas tengan una marca de tiempo para el orden
      categorias.forEach((cat, index) => {
          if (!data[cat]._timestamp) {
              // Asignar una marca de tiempo basada en su posición actual + un pequeño delay
              // para que al menos mantengan el orden que tienen en este momento
              data[cat]._timestamp = Date.now() + index;
              huboCambiosDeOrden = true;
          }
      });

      // Si asignamos marcas de tiempo nuevas, guardarlas permanentemente en Firebase
      if (huboCambiosDeOrden) {
          guardarStorage();
      }

      // Ordenar por marca de tiempo (la más antigua primero)
      const categoriasOrdenadas = categorias.sort((a, b) => {
          const timeA = data[a]._timestamp || 0;
          const timeB = data[b]._timestamp || 0;
          if (timeA !== timeB) return timeA - timeB;
          return a.localeCompare(b); // Desempate por nombre si los tiempos son iguales
      });

      categoriasOrdenadas.forEach((cat, index)=>{
          const catDiv = document.createElement("div");
          catDiv.className = "cat-item";
          catDiv.draggable = true;
          catDiv.dataset.categoria = cat;
          catDiv.dataset.index = index;
          
          const header = document.createElement("div");
          header.className = "cat-header" + (cat === categoriaActual ? " active" : "");
          header.innerHTML = `
            <div class="cat-name"><i class="fa-solid ${categoriasAbiertas[cat] ? 'fa-folder-open' : 'fa-folder'}"></i> ${cat}</div>
            <div class="cat-menu" style="display:flex; gap:6px; align-items:center;">
              <button class="cat-menu-btn" onclick="renombrarCategoria('${cat.replace(/'/g, "\\'")}')
" title="Renombrar" style="background:none; border:none; color:var(--text-muted); cursor:pointer; padding:4px 6px; border-radius:4px; transition:var(--transition);" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'" onclick="event.stopPropagation();"><i class="fa-solid fa-pen-to-square" style="font-size:12px"></i></button>
              <button class="cat-menu-btn" onclick="eliminarCategoria('${cat.replace(/'/g, "\\'")}')
" title="Eliminar" style="background:none; border:none; color:var(--text-muted); cursor:pointer; padding:4px 6px; border-radius:4px; transition:var(--transition);" onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--text-muted)'" onclick="event.stopPropagation();"><i class="fa-solid fa-trash" style="font-size:12px"></i></button>
              <i class="fa-solid fa-chevron-${categoriasAbiertas[cat] ? 'down' : 'right'}" style="font-size:10px"></i>
            </div>
          `;
          
          header.onclick = () => {
              categoriaActual = cat;
              docActual = null;
              categoriasAbiertas[cat] = !categoriasAbiertas[cat];
              editor.style.display = "none";
              document.getElementById("toolbar").style.display = "none";
              document.getElementById("welcomeScreen").style.display = "flex";
              render();
          };
          
          // Drag and Drop events
          catDiv.addEventListener('dragstart', (e) => {
              draggedCategory = cat;
              catDiv.style.opacity = '0.5';
              e.dataTransfer.effectAllowed = 'move';
          });
          
          catDiv.addEventListener('dragover', (e) => {
              e.preventDefault();
              e.dataTransfer.dropEffect = 'move';
              catDiv.style.borderTop = '3px solid var(--primary)';
          });
          
          catDiv.addEventListener('dragleave', (e) => {
              catDiv.style.borderTop = 'none';
          });
          
          catDiv.addEventListener('drop', (e) => {
              e.preventDefault();
              catDiv.style.borderTop = 'none';
              if (draggedCategory && draggedCategory !== cat) {
                  const tempTime = data[draggedCategory]._timestamp;
                  data[draggedCategory]._timestamp = data[cat]._timestamp;
                  data[cat]._timestamp = tempTime;
                  draggedCategory = null;
                  guardarStorage();
                  render();
              }
          });
          
          catDiv.addEventListener('dragend', (e) => {
              catDiv.style.opacity = '1';
              catDiv.style.borderTop = 'none';
              draggedCategory = null;
          });
          
          catDiv.appendChild(header);

          if(categoriasAbiertas[cat]){
              const dList = document.createElement("div");
              dList.className = "doc-list";
              
              // Obtener documentos de la categoría
              const documentos = Object.keys(data[cat]).filter(k => k !== "_timestamp");
              
              // Asegurar que tengan timestamp para ordenación
              documentos.forEach((doc, idx) => {
                  // Si es string (formato antiguo), convertir a objeto con timestamp al abrir o procesar
                  // Para el renderizado, solo nos interesa el timestamp si existe
                  if (data[cat][doc] && typeof data[cat][doc] === 'object' && !data[cat][doc]._timestamp) {
                      data[cat][doc]._timestamp = Date.now() + idx;
                  } else if (typeof data[cat][doc] === 'string') {
                      // No convertimos aquí para no ensuciar, pero permitimos la lógica de orden
                  }
              });

              // Ordenar documentos
              const docsOrdenados = documentos.sort((a, b) => {
                  const valA = (data[cat][a] && data[cat][a]._timestamp) ? data[cat][a]._timestamp : 0;
                  const valB = (data[cat][b] && data[cat][b]._timestamp) ? data[cat][b]._timestamp : 0;
                  if (valA !== valB) return valA - valB;
                  return a.localeCompare(b);
              });

              docsOrdenados.forEach(d => {
                  const dItem = document.createElement("div");
                  dItem.className = "doc-item" + (d === docActual ? " active" : "");
                  dItem.draggable = true;
                  dItem.innerHTML = `<i class="fa-solid fa-file-lines"></i> ${d}`;
                  
                  dItem.onclick = (e) => {
                      e.stopPropagation();
                      abrir(cat, d);
                  };

                  // Document Drag Events
                  dItem.addEventListener('dragstart', (e) => {
                      e.stopPropagation();
                      draggedDocument = d;
                      draggedDocumentSourceCat = cat;
                      dItem.style.opacity = '0.5';
                  });

                  dItem.addEventListener('dragover', (e) => {
                      e.preventDefault();
                      e.stopPropagation();
                      if (draggedDocumentSourceCat === cat) {
                          dItem.style.borderTop = '2px solid var(--primary)';
                      }
                  });

                  dItem.addEventListener('dragleave', (e) => {
                      dItem.style.borderTop = 'none';
                  });

                  dItem.addEventListener('drop', (e) => {
                      e.preventDefault();
                      e.stopPropagation();
                      dItem.style.borderTop = 'none';
                      
                      if (draggedDocument && draggedDocumentSourceCat === cat && draggedDocument !== d) {
                          // Asegurar que ambos sean objetos para tener timestamp
                          if (typeof data[cat][draggedDocument] === 'string') {
                              data[cat][draggedDocument] = { content: data[cat][draggedDocument], _timestamp: Date.now() };
                          }
                          if (typeof data[cat][d] === 'string') {
                              data[cat][d] = { content: data[cat][d], _timestamp: Date.now() + 1 };
                          }

                          const tempTime = data[cat][draggedDocument]._timestamp;
                          data[cat][draggedDocument]._timestamp = data[cat][d]._timestamp;
                          data[cat][d]._timestamp = tempTime;
                          
                          draggedDocument = null;
                          draggedDocumentSourceCat = null;
                          guardarStorage();
                          render();
                      }
                  });

                  dItem.addEventListener('dragend', (e) => {
                      dItem.style.opacity = '1';
                      dItem.style.borderTop = 'none';
                      draggedDocument = null;
                      draggedDocumentSourceCat = null;
                  });

                  dList.appendChild(dItem);
              });
              catDiv.appendChild(dList);
          }
          lista.appendChild(catDiv);
      });
  }

  window.nuevaCategoria = function(){
      const n = prompt("Nombre de la nueva categoría:");
      if(!n || data[n]) return;
      // Crear categoría con marca de tiempo para el orden
      data[n] = {
          _timestamp: Date.now()
      };
      guardarStorage();
      render();
  }

  window.renombrarCategoria = function(catActual){
      const nuevoNombre = prompt("Nuevo nombre de la categoría:", catActual);
      if(!nuevoNombre || nuevoNombre === catActual || data[nuevoNombre]) return;
      
      // Copiar los documentos y la marca de tiempo a la nueva categoría
      data[nuevoNombre] = data[catActual];
      delete data[catActual];
      
      // Actualizar referencias
      if(categoriaActual === catActual) categoriaActual = nuevoNombre;
      
      guardarStorage();
      render();
      alert("Categoría renombrada correctamente ✔");
  }

  window.eliminarCategoria = function(cat){
      // Contar documentos ignorando el campo _timestamp
      const docCount = Object.keys(data[cat] || {}).filter(k => k !== "_timestamp").length;
      const mensaje = docCount > 0 
          ? `Esta categoría contiene ${docCount} documento(s). ¿Estás seguro de que deseas eliminarla? Esta acción no se puede deshacer.`
          : "¿Estás seguro de que deseas eliminar esta categoría?";
      
      if(!confirm(mensaje)) return;
      
      delete data[cat];
      
      if(categoriaActual === cat) categoriaActual = null;
      docActual = null;
      
      editor.style.display = "none";
      document.getElementById("toolbar").style.display = "none";
      document.getElementById("welcomeScreen").style.display = "flex";
      
      guardarStorage();
      render();
      alert("Categoría eliminada correctamente ✔");
  }

  window.nuevoDocumento = function(){
      if(!categoriaActual) return alert("Primero selecciona una categoría");
      const n = prompt("Nombre del nuevo documento:");
      if(!n || data[categoriaActual][n]) return;
      data[categoriaActual][n] = "";
      abrir(categoriaActual, n);
  }

  window.abrir = function(cat, docName){
      // Guardar en buffer antes de cambiar
      if(categoriaActual && docActual){
          bufferTemporal[categoriaActual + "||" + docActual] = editor.innerHTML;
      }

      categoriaActual = cat;
      docActual = docName;
      
      // Ocultar bienvenida y mostrar editor
      document.getElementById("welcomeScreen").style.display = "none";
      editor.style.display = "block";
      editor.contentEditable = "true";
      
      const key = cat + "||" + docName;
      let contenido = bufferTemporal[key] ?? data[cat][docName] ?? "";
      if (typeof contenido === 'object' && contenido !== null) {
          contenido = contenido.content || "";
      }
      editor.innerHTML = contenido;
      
      // Inicializar interactividad para imágenes cargadas
      editor.querySelectorAll('.img-wrapper').forEach(wrapper => {
          // Limpiar manejadores existentes si los hay para evitar duplicados
          wrapper.querySelectorAll('.resize-handle').forEach(h => h.remove());
          setupImageInteractivity(wrapper);
      });

      document.getElementById("toolbar").style.display = "flex";
      render();
  }

  window.guardar = function(){
      if (activeImage) {
          activeImage.classList.remove('selected');
          activeImage = null;
      }
      if(categoriaActual && docActual){
          bufferTemporal[categoriaActual + "||" + docActual] = editor.innerHTML;
      }

      // Volcar buffer a data
      for(const key in bufferTemporal){
          const [cat, docName] = key.split("||");
          if(!data[cat]) data[cat] = {};
          
          // Mantener el timestamp si ya existe
          const oldData = data[cat][docName];
          if (typeof oldData === 'object' && oldData !== null && oldData._timestamp) {
              data[cat][docName] = {
                  content: bufferTemporal[key],
                  _timestamp: oldData._timestamp
              };
          } else {
              data[cat][docName] = bufferTemporal[key];
          }
      }

      bufferTemporal = {};
      guardarStorage();
      alert("Todo guardado correctamente ✔");
  }

  window.eliminar = function(){
      if(!confirm("¿Estás seguro de eliminar este elemento?")) return;
      if(docActual){
          delete data[categoriaActual][docActual];
          docActual = null;
      } else if(categoriaActual){
          delete data[categoriaActual];
          categoriaActual = null;
      }
      editor.style.display="none";
      document.getElementById("toolbar").style.display="none";
      document.getElementById("welcomeScreen").style.display = "flex";
      guardarStorage();
      render();
  }

  function guardarStorage(){
      if (currentUser && userProfileData.nombre) {
          setDoc(doc(collection(db, 'usuarios'), currentUser.uid), {
              nombre: userProfileData.nombre || "",
              email: userProfileData.email || currentUser.email,
              avatarUrl: userProfileData.avatarUrl || "",
              fechaRegistro: userProfileData.fechaRegistro || new Date(),
              documentos: data || {},
              ultimaActualizacion: new Date()
          }, { merge: false }).catch(err => {
              console.error("Error guardando en Firebase:", err);
          });
      }
  }

  window.buscarPorTitulo = function(txt){
      const q = txt.trim().toLowerCase();
      if(!q){
          categoriasAbiertas = {};
          editor.style.display = "none";
          document.getElementById("toolbar").style.display = "none";
          render();
          return;
      }

      for(const cat in data){
          for(const docName in data[cat]){
              if(docName.toLowerCase().includes(q)){
                  categoriasAbiertas[cat] = true;
                  abrir(cat, docName);
                  return;
              }
          }
      }
  }

  // ========= EVENTO DE PEGADO DE IMÁGENES EN EL EDITOR =========
  let activeImage = null;
  
  // Crear el overlay para la vista previa una sola vez
  const previewOverlay = document.createElement('div');
  previewOverlay.className = 'img-preview-overlay';
  previewOverlay.innerHTML = '<img src="" alt="Preview">';
  document.body.appendChild(previewOverlay);
  const previewImg = previewOverlay.querySelector('img');

  function setupImageInteractivity(wrapper) {
      const img = wrapper.querySelector('img');
      
      // Funcionalidad de vista previa al pasar el mouse
      let previewTimeout;
      wrapper.addEventListener('mouseenter', () => {
          if (activeImage === wrapper) return;
          previewTimeout = setTimeout(() => {
              previewImg.src = img.src;
              previewOverlay.classList.add('active');
          }, 300); // Reducido a 0.3 segundos para más agilidad
      });

      wrapper.addEventListener('mouseleave', () => {
          clearTimeout(previewTimeout);
          previewOverlay.classList.remove('active');
      });

      const handles = ['nw', 'ne', 'sw', 'se'];
      handles.forEach(pos => {
          const handle = document.createElement('div');
          handle.className = `resize-handle handle-${pos}`;
          wrapper.appendChild(handle);

          handle.addEventListener('mousedown', (e) => {
              e.preventDefault();
              e.stopPropagation();
              
              const startX = e.clientX;
              const startY = e.clientY;
              const startWidth = wrapper.offsetWidth;
              const startHeight = wrapper.offsetHeight;
              const startTop = wrapper.offsetTop;
              const startLeft = wrapper.offsetLeft;

              const onMouseMove = (moveEvent) => {
                  let newWidth = startWidth;
                  let newHeight = startHeight;
                  const dx = moveEvent.clientX - startX;
                  const dy = moveEvent.clientY - startY;

                  if (pos.includes('e')) newWidth = startWidth + dx;
                  if (pos.includes('w')) newWidth = startWidth - dx;
                  if (pos.includes('s')) newHeight = startHeight + dy;
                  if (pos.includes('n')) newHeight = startHeight - dy;

                  if (newWidth > 50) {
                      wrapper.style.width = newWidth + 'px';
                      if (pos.includes('w')) wrapper.style.left = (startLeft + dx) + 'px';
                  }
                  if (newHeight > 50) {
                      wrapper.style.height = 'auto'; // Mantener ratio
                      if (pos.includes('n')) wrapper.style.top = (startTop + dy) + 'px';
                  }
              };

              const onMouseUp = () => {
                  document.removeEventListener('mousemove', onMouseMove);
                  document.removeEventListener('mouseup', onMouseUp);
              };

              document.addEventListener('mousemove', onMouseMove);
              document.addEventListener('mouseup', onMouseUp);
          });
      });

      wrapper.addEventListener('mousedown', (e) => {
          if (e.target.classList.contains('resize-handle')) return;
          
          e.preventDefault();
          e.stopPropagation();
          
          if (activeImage) activeImage.classList.remove('selected');
          activeImage = wrapper;
          wrapper.classList.add('selected');

          const startX = e.clientX - wrapper.offsetLeft;
          const startY = e.clientY - wrapper.offsetTop;
          
          wrapper.style.position = (wrapper.style.position === 'absolute') ? 'absolute' : 'relative';

          const onMouseMove = (moveEvent) => {
              wrapper.style.position = 'absolute';
              const editorRect = editor.getBoundingClientRect();
              let left = moveEvent.clientX - editorRect.left - startX;
              let top = moveEvent.clientY - editorRect.top - startY + editor.scrollTop;
              
              wrapper.style.left = left + 'px';
              wrapper.style.top = top + 'px';
              wrapper.style.margin = '0';
          };

          const onMouseUp = () => {
              document.removeEventListener('mousemove', onMouseMove);
              document.removeEventListener('mouseup', onMouseUp);
          };

          document.addEventListener('mousemove', onMouseMove);
          document.addEventListener('mouseup', onMouseUp);
      });
  }

  document.addEventListener('mousedown', (e) => {
      if (activeImage && !activeImage.contains(e.target)) {
          activeImage.classList.remove('selected');
          activeImage = null;
      }
  });

  document.addEventListener('keydown', (e) => {
      if ((e.key === 'Delete' || e.key === 'Backspace') && activeImage) {
          activeImage.remove();
          activeImage = null;
      }
  });

  editor.addEventListener('paste', (e) => {
      const items = e.clipboardData.items;
      let hasImage = false;
      
      // Primero verificar si hay una imagen en el portapapeles
      for (let item of items) {
          if (item.kind === 'file' && item.type.startsWith('image/')) {
              hasImage = true;
              e.preventDefault();
              const file = item.getAsFile();
              const reader = new FileReader();
              
              reader.onload = (event) => {
                  const base64 = event.target.result;
                  const wrapper = document.createElement('div');
                  wrapper.className = 'img-wrapper';
                  wrapper.contentEditable = false;
                  wrapper.style.width = '300px';
                  
                  const img = document.createElement('img');
                  img.src = base64;
                  wrapper.appendChild(img);
                  setupImageInteractivity(wrapper);

                  const selection = window.getSelection();
                  if (selection.rangeCount > 0) {
                      const range = selection.getRangeAt(0);
                      range.deleteContents();
                      const spaceBefore = document.createTextNode('\u00A0');
                      const spaceAfter = document.createTextNode('\u00A0');
                      range.insertNode(spaceAfter);
                      range.insertNode(wrapper);
                      range.insertNode(spaceBefore);
                      range.setStartAfter(spaceAfter);
                      range.collapse(true);
                      selection.removeAllRanges();
                      selection.addRange(range);
                  } else {
                      editor.appendChild(wrapper);
                      editor.appendChild(document.createTextNode('\u00A0'));
                  }
                  editor.focus();
              };
              reader.readAsDataURL(file);
              return; // Si procesamos imagen, salimos
          }
      }

      // Si no es imagen, procesar como texto limpio
      if (!hasImage) {
          e.preventDefault();
          // Obtener texto plano para evitar etiquetas HTML de Word/Web
          const text = e.clipboardData.getData('text/plain');
          if (text) {
              document.execCommand('insertText', false, text);
          }
      }
  });

  // ========= COMANDOS DEL EDITOR (RESTAURADOS) =========
  window.cmd = (c, v = null) => { 
      editor.focus(); 
      document.execCommand(c, false, v); 
  }
  

  
  window.setFontSize = (s) => { 
      if(!s) return;
      editor.focus();
      document.execCommand("fontSize", false, "7");
      const fonts = editor.getElementsByTagName("font");
      for(let f of fonts) {
          if(f.size == "7") { 
              f.removeAttribute("size"); 
              f.style.fontSize = s + "px"; 
          }
      }
  }

  // ========= CAMBIAR NOMBRE DE USUARIO =========
  window.cambiarNombreUsuario = function(){
      const nuevoNombre = prompt("Ingresa tu nuevo nombre de usuario:", userProfileData.nombre || "");
      if(!nuevoNombre || nuevoNombre.trim() === "") return;
      
      const nombreLimpio = nuevoNombre.trim();
      
      // Actualizar en memoria
      userProfileData.nombre = nombreLimpio;
      
      // Actualizar en la interfaz
      document.getElementById("nombreUsuario").textContent = nombreLimpio;
      const avatarText = document.getElementById("userAvatar").querySelector(".avatar-text");
      if(avatarText) avatarText.textContent = nombreLimpio.charAt(0).toUpperCase();
      
      // RESPALDO INMEDIATO: Guardar en localStorage
      localStorage.setItem(`ems_username_${currentUser.uid}`, nombreLimpio);
      
      // Guardar en Firebase
      if(currentUser){
          setDoc(doc(collection(db, 'usuarios'), currentUser.uid), {
              nombre: nombreLimpio,
              email: userProfileData.email,
              avatarUrl: userProfileData.avatarUrl,
              fechaRegistro: userProfileData.fechaRegistro,
              documentos: data,
              ultimaActualizacion: new Date()
          }, { merge: false }).then(() => {
              alert("Nombre actualizado correctamente ✔");
          }).catch(err => {
              alert("Error al actualizar nombre: " + err.message);
          });
      }
  }

  // ========= CAMBIAR AVATAR =========
  window.abrirCambiarAvatar = function(){
      const modal = document.createElement("div");
      modal.id = "avatarModal";
      modal.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.7);
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 1000;
      `;
      
      const card = document.createElement("div");
      card.style.cssText = `
          background: var(--bg-card);
          border: 1px solid var(--border);
          border-radius: 16px;
          padding: 32px;
          max-width: 500px;
          width: 90%;
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      `;
      
      card.innerHTML = `
          <h2 style="font-family: 'Montserrat', sans-serif; margin-bottom: 20px; color: var(--text-main);">Cambiar Imagen de Perfil</h2>
          <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 14px;">Elige una opcion:</p>
          
          <div style="display: flex; flex-direction: column; gap: 12px;">
              <button id="btnPegar" style="
                  padding: 12px;
                  background: var(--primary);
                  color: white;
                  border: none;
                  border-radius: 8px;
                  cursor: pointer;
                  font-weight: 600;
                  transition: var(--transition);
              " onmouseover="this.style.background='var(--primary-dark)'" onmouseout="this.style.background='var(--primary)'">
                  <i class="fa-solid fa-paste"></i> Pegar desde Portapapeles (Ctrl+V)
              </button>
              
              <button id="btnURL" style="
                  padding: 12px;
                  background: rgba(59, 130, 246, 0.2);
                  color: var(--primary);
                  border: 1px solid var(--primary);
                  border-radius: 8px;
                  cursor: pointer;
                  font-weight: 600;
                  transition: var(--transition);
              " onmouseover="this.style.background='rgba(59, 130, 246, 0.3)'" onmouseout="this.style.background='rgba(59, 130, 246, 0.2)'">
                  <i class="fa-solid fa-link"></i> Usar URL de Imagen
              </button>
              
              <button id="btnCancelar" style="
                  padding: 12px;
                  background: transparent;
                  color: var(--text-muted);
                  border: 1px solid var(--border);
                  border-radius: 8px;
                  cursor: pointer;
                  font-weight: 600;
                  transition: var(--transition);
              " onmouseover="this.style.background='rgba(255, 255, 255, 0.05)'" onmouseout="this.style.background='transparent'">
                  Cancelar
              </button>
          </div>
          
          <div id="pasteArea" style="
              display: none;
              margin-top: 20px;
              padding: 20px;
              background: rgba(255, 255, 255, 0.05);
              border: 2px dashed var(--border);
              border-radius: 8px;
              text-align: center;
              color: var(--text-muted);
              font-size: 14px;
          ">
              <p><i class="fa-solid fa-image" style="font-size: 24px; margin-bottom: 10px; display: block;"></i></p>
              <p>Presiona <strong>Ctrl+V</strong> para pegar tu imagen aqui</p>
          </div>
      `;
      
      modal.appendChild(card);
      document.body.appendChild(modal);
      
      const btnPegar = card.querySelector("#btnPegar");
      const btnURL = card.querySelector("#btnURL");
      const btnCancelar = card.querySelector("#btnCancelar");
      const pasteArea = card.querySelector("#pasteArea");
      
      btnPegar.onclick = () => {
          pasteArea.style.display = "block";
          pasteArea.focus();
          
          const handlePaste = (e) => {
              e.preventDefault();
              const items = e.clipboardData.items;
              
              for(let item of items){
                  if(item.type.indexOf("image") !== -1){
                      const blob = item.getAsFile();
                      const reader = new FileReader();
                      
                      reader.onload = (event) => {
                          const base64 = event.target.result;
                          cambiarAvatarBase64(base64);
                          modal.remove();
                      };
                      
                      reader.readAsDataURL(blob);
                      return;
                  }
              }
              
              alert("No se encontro una imagen en el portapapeles. Por favor, copia una imagen primero.");
          };
          
          document.addEventListener("paste", handlePaste);
          
          const originalRemove = modal.remove.bind(modal);
          modal.remove = function(){
              document.removeEventListener("paste", handlePaste);
              originalRemove();
          };
      };
      
      btnURL.onclick = () => {
          modal.remove();
          const urlImagen = prompt("Pega la URL de tu imagen de perfil:");
          if(urlImagen && urlImagen.trim() !== "") {
              cambiarAvatar(urlImagen.trim());
          }
      };
      
      btnCancelar.onclick = () => modal.remove();
  }

  window.cambiarAvatar = function(urlImagen){
      const avatar = document.getElementById("userAvatar");
      const avatarPreview = document.getElementById("avatarPreview");
      const avatarText = avatar.querySelector(".avatar-text");
      
      const img = new Image();
      img.onload = function(){
          avatar.style.backgroundImage = `url('${urlImagen}')`;
          if(avatarPreview) avatarPreview.style.backgroundImage = `url('${urlImagen}')`;
          if(avatarText) avatarText.style.display = "none";
          
          if(currentUser){
              userProfileData.avatarUrl = urlImagen;
              setDoc(doc(collection(db, 'usuarios'), currentUser.uid), {
                  avatarUrl: urlImagen,
                  ultimaActualizacion: new Date()
              }, { merge: true }).then(() => {
                  alert("Imagen de perfil actualizada correctamente ✔");
              });
          }
      };
      img.onerror = function(){
          alert("No se pudo cargar la imagen. Verifica que la URL sea correcta.");
      };
      img.src = urlImagen;
  }

  window.cambiarAvatarBase64 = function(base64){
      const avatar = document.getElementById("userAvatar");
      const avatarPreview = document.getElementById("avatarPreview");
      const avatarText = avatar.querySelector(".avatar-text");
      
      avatar.style.backgroundImage = `url('${base64}')`;
      if(avatarPreview) avatarPreview.style.backgroundImage = `url('${base64}')`;
      if(avatarText) avatarText.style.display = "none";
      
      if(currentUser){
          userProfileData.avatarUrl = base64;
          setDoc(doc(collection(db, 'usuarios'), currentUser.uid), {
              avatarUrl: base64,
              ultimaActualizacion: new Date()
          }, { merge: true }).then(() => {
              alert("Imagen de perfil actualizada ✔");
          });
      }
  }

  window.cargarAvatarGuardado = function(userData){
      const avatar = document.getElementById("userAvatar");
      const avatarPreview = document.getElementById("avatarPreview");
      const avatarText = avatar.querySelector(".avatar-text");
      
      if(userData && userData.avatarUrl){
          avatar.style.backgroundImage = `url('${userData.avatarUrl}')`;
          if(avatarPreview) avatarPreview.style.backgroundImage = `url('${userData.avatarUrl}')`;
          if(avatarText) avatarText.style.display = "none";
      } else {
          avatar.style.backgroundImage = "";
          if(avatarPreview) avatarPreview.style.backgroundImage = "";
          if(avatarText) avatarText.style.display = "block";
      }
  }

</script>
