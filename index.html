<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMS Manual - Sistema de Gestión Documental</title>
<!-- Google Fonts: Inter & Montserrat -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<!-- Font Awesome para iconos -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --primary:#3b82f6;
    --primary-dark:#2563eb;
    --primary-glow:rgba(59,130,246,0.5);
    --bg-body:#05070a;
    --bg-card:rgba(17,25,40,0.75);
    --bg-sidebar:#0d1117;
    --text-main:#f8fafc;
    --text-muted:#94a3b8;
    --border:rgba(255,255,255,0.08);
    --success:#10b981;
    --danger:#ef4444;
    --transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Inter', sans-serif;
    background-color:var(--bg-body);
    color:var(--text-main);
    overflow:hidden;
    height:100vh;
}

/* ===== LOGIN MODERNO ===== */
.login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top right, rgba(59,130,246,0.15), transparent),
                radial-gradient(circle at bottom left, rgba(16,185,129,0.1), transparent);
    position:relative;
}

.login-card{
    background:var(--bg-card);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--border);
    border-radius:24px;
    width:440px;
    padding:48px;
    box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);
    text-align:center;
    z-index:10;
}

.ems-logo-container{
    width:80px;
    height:80px;
    background:white;
    border-radius:20px;
    margin:0 auto 24px;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 30px var(--primary-glow);
}

.ems-logo-container i{
    font-size:40px;
    color:var(--danger);
}

.login-card h1{
    font-family:'Montserrat', sans-serif;
    font-size:32px;
    margin-bottom:8px;
    background:linear-gradient(to right, #fff, #94a3b8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.login-card p{
    color:var(--text-muted);
    font-size:14px;
    margin-bottom:32px;
}

.input-group{
    margin-bottom:20px;
    text-align:left;
}

.input-group label{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--text-muted);
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.input-wrapper{
    position:relative;
}

.input-wrapper i{
    position:absolute;
    left:16px;
    top:50%;
    transform:translateY(-50%);
    color:var(--text-muted);
}

.input-wrapper input{
    width:100%;
    padding:14px 16px 14px 48px;
    background:rgba(0,0,0,0.3);
    border:1px solid var(--border);
    border-radius:12px;
    color:white;
    font-size:15px;
    transition:var(--transition);
}

.input-wrapper input:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(59,130,246,0.15);
}

.btn-primary{
    width:100%;
    padding:14px;
    background:var(--primary);
    color:white;
    border:none;
    border-radius:12px;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    transition:var(--transition);
    margin-top:10px;
}

.btn-primary:hover{
    background:var(--primary-dark);
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(59,130,246,0.3);
}

.btn-secondary{
    width:100%;
    padding:14px;
    background:transparent;
    color:var(--text-main);
    border:1px solid var(--border);
    border-radius:12px;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:var(--transition);
    margin-top:12px;
}

.btn-secondary:hover{
    background:rgba(255,255,255,0.05);
}

/* ===== APP LAYOUT ===== */
.app-container{
    display:grid;
    grid-template-columns:280px 1fr;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    background:var(--bg-sidebar);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    padding:24px;
}

.app-logo{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:40px;
}

.app-logo i{
    color:var(--danger);
    font-size:24px;
}

.app-logo span{
    font-family:'Montserrat', sans-serif;
    font-weight:800;
    font-size:20px;
    letter-spacing:-0.5px;
}

.nav-section{
    flex:1;
    overflow-y:auto;
}

.nav-section::-webkit-scrollbar{ width:4px; }
.nav-section::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.1); border-radius:10px; }

.sidebar-btn{
    width:100%;
    padding:12px;
    margin-bottom:8px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    font-size:14px;
    transition:var(--transition);
}

.btn-add-cat{ background:rgba(16,185,129,0.1); color:var(--success); }
.btn-add-cat:hover{ background:rgba(16,185,129,0.2); }

.btn-add-doc{ background:rgba(59,130,246,0.1); color:var(--primary); }
.btn-add-doc:hover{ background:rgba(59,130,246,0.2); }

.cat-item{
    margin-bottom:4px;
}

.cat-header{
    padding:10px 12px;
    border-radius:8px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    transition:var(--transition);
}

.cat-header:hover{ background:rgba(255,255,255,0.05); }
.cat-header.active{ background:rgba(59,130,246,0.1); color:var(--primary); }

.cat-name{ font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px; }

.doc-list{ margin-left:24px; margin-top:4px; border-left:1px solid var(--border); padding-left:12px; }

.doc-item{
    padding:8px 12px;
    font-size:13px;
    color:var(--text-muted);
    cursor:pointer;
    border-radius:6px;
    margin-bottom:2px;
    transition:var(--transition);
}

.doc-item:hover{ color:var(--text-main); background:rgba(255,255,255,0.03); }
.doc-item.active{ color:white; background:var(--primary); font-weight:600; }

/* MAIN CONTENT */
.main-content{
    display:flex;
    flex-direction:column;
    background:#05070a;
}

.top-bar{
    padding:16px 32px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(13,17,23,0.8);
    backdrop-filter:blur(10px);
}

.search-bar{
    position:relative;
    width:400px;
}

.search-bar i{ position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--text-muted); }
.search-bar input{
    width:100%;
    padding:10px 16px 10px 44px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    border-radius:10px;
    color:white;
    font-size:14px;
}

.user-profile{
    display:flex;
    align-items:center;
    gap:12px;
}

.user-meta{ text-align:right; }
.user-meta h4{ font-size:14px; font-weight:700; }
.user-meta p{ font-size:11px; color:var(--text-muted); }

.avatar{
    width:40px;
    height:40px;
    border-radius:10px;
    background:linear-gradient(45deg, var(--primary), var(--success));
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:800;
    color:white;
}

.btn-logout{
    padding:8px;
    color:var(--text-muted);
    cursor:pointer;
    transition:var(--transition);
}

.btn-logout:hover{ color:var(--danger); }

/* EDITOR AREA */
.editor-container{
    flex:1;
    padding:32px;
    display:flex;
    flex-direction:column;
    gap:20px;
    overflow:hidden;
}

.editor-toolbar{
    background:var(--bg-sidebar);
    padding:12px;
    border-radius:12px;
    border:1px solid var(--border);
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
}

.tool-btn{
    width:36px;
    height:36px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:transparent;
    border:none;
    color:var(--text-muted);
    border-radius:8px;
    cursor:pointer;
    transition:var(--transition);
}

.tool-btn:hover{ background:rgba(255,255,255,0.05); color:white; }

.tool-select{
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    color:white;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
    outline:none;
}

.tool-sep{ width:1px; height:24px; background:var(--border); margin:0 4px; }

.btn-save{ background:var(--success) !important; color:white !important; padding:0 16px !important; width:auto !important; font-weight:700; font-size:12px; }
.btn-delete{ background:rgba(239,68,68,0.1) !important; color:var(--danger) !important; padding:0 16px !important; width:auto !important; font-weight:700; font-size:12px; }

.editor-paper{
    flex:1;
    background:var(--bg-sidebar);
    border-radius:16px;
    border:1px solid var(--border);
    padding:40px;
    overflow-y:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    font-size:16px;
    line-height:1.8;
    outline:none;
}

.editor-paper:empty::before{
    content: 'Comienza a escribir tu documento EMS...';
    color: var(--text-muted);
}

/* RESPONSIVE */
@media (max-width: 1024px) {
    .app-container { grid-template-columns: 1fr; }
    .sidebar { display: none; }
}
</style>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="login" class="login">
    <div class="login-card">
        <div class="ems-logo-container">
            <i class="fa-solid fa-star-of-life"></i>
        </div>
        <h1>EMS Manual</h1>
        <p id="loginSubtitle">Gestión Documental de Emergencias</p>
        
        <div class="input-group">
            <label>Correo Electrónico</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input id="emailInput" type="email" placeholder="nombre@ejemplo.com">
            </div>
        </div>
        
        <div class="input-group">
            <label>Contraseña</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input id="passwordInput" type="password" placeholder="••••••••">
            </div>
        </div>
        
        <div class="input-group" id="nameGroup" style="display:none;">
            <label>Nombre Completo</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input id="nameInput" type="text" placeholder="Tu nombre">
            </div>
        </div>
        
        <button id="mainBtn" class="btn-primary" onclick="handleAuth()">Iniciar Sesión</button>
        <button id="toggleBtn" class="btn-secondary" onclick="toggleRegister()">Crear una cuenta</button>
    </div>
</div>

<!-- APLICACIÓN PRINCIPAL -->
<div id="app" style="display:none">
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="app-logo">
                <i class="fa-solid fa-star-of-life"></i>
                <span>EMS MANUAL</span>
            </div>
            
            <div class="buttons">
                <button class="sidebar-btn btn-add-cat" onclick="nuevaCategoria()">
                    <i class="fa-solid fa-folder-plus"></i> Nueva Categoría
                </button>
                <button class="sidebar-btn btn-add-doc" onclick="nuevoDocumento()">
                    <i class="fa-solid fa-file-circle-plus"></i> Nuevo Documento
                </button>
            </div>
            
            <div class="nav-section" id="lista">
                <!-- Las categorías se cargarán aquí -->
            </div>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Buscar en documentos..." oninput="buscarPorTitulo(this.value)">
                </div>
                
                <div class="user-profile">
                    <div class="user-meta">
                        <h4 id="nombreUsuario">Usuario</h4>
                        <p id="emailUsuario">usuario@ems.com</p>
                    </div>
                    <div class="avatar" id="userAvatar">U</div>
                    <div class="btn-logout" onclick="cerrarSesion()" title="Cerrar Sesión">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </div>
                </div>
            </header>

            <div class="editor-container">
                <div class="editor-toolbar" id="toolbar" style="display:none">
                    <button class="tool-btn" onclick="cmd('bold')" title="Negrita"><i class="fa-solid fa-bold"></i></button>
                    <button class="tool-btn" onclick="cmd('italic')" title="Cursiva"><i class="fa-solid fa-italic"></i></button>
                    <button class="tool-btn" onclick="cmd('underline')" title="Subrayado"><i class="fa-solid fa-underline"></i></button>
                    
                    <div class="tool-sep"></div>
                    
                    <select class="tool-select" onchange="cmd('fontName', this.value)">
                        <option value="Inter">Inter</option>
                        <option value="Arial">Arial</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Courier New">Courier</option>
                    </select>
                    
                    <select class="tool-select" onchange="setFontSize(this.value)">
                        <option value="14">14px</option>
                        <option value="16">16px</option>
                        <option value="18">18px</option>
                        <option value="24">24px</option>
                    </select>
                    
                    <div class="tool-sep"></div>
                    
                    <button class="tool-btn" onclick="cmd('justifyLeft')"><i class="fa-solid fa-align-left"></i></button>
                    <button class="tool-btn" onclick="cmd('justifyCenter')"><i class="fa-solid fa-align-center"></i></button>
                    <button class="tool-btn" onclick="cmd('justifyRight')"><i class="fa-solid fa-align-right"></i></button>
                    
                    <div class="tool-sep"></div>
                    
                    <button class="tool-btn" onclick="insertImage()"><i class="fa-solid fa-image"></i></button>
                    
                    <div style="flex:1"></div>
                    
                    <button class="sidebar-btn btn-save" onclick="guardar()">
                        <i class="fa-solid fa-floppy-disk"></i> GUARDAR
                    </button>
                    <button class="sidebar-btn btn-delete" onclick="eliminar()">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
                
                <div id="editor" class="editor-paper" contenteditable="false"></div>
            </div>
        </main>
    </div>
</div>

<!-- Firebase SDK v12 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCyhzS4DNTraa0ALKpnncJC85sVA4vvmYQ",
    authDomain: "base-ems.firebaseapp.com",
    projectId: "base-ems",
    storageBucket: "base-ems.firebasestorage.app",
    messagingSenderId: "1029573637298",
    appId: "1:1029573637298:web:58dc8391bda7f1f13f45ab",
    measurementId: "G-SQXQN52J67"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let data = {};
  let categoriasAbiertas = {};
  let categoriaActual = null;
  let docActual = null;
  let isRegisterMode = false;

  const lista = document.getElementById("lista");
  const editor = document.getElementById("editor");

  // AUTH FUNCTIONS
  window.toggleRegister = function(){
      isRegisterMode = !isRegisterMode;
      const nameGroup = document.getElementById("nameGroup");
      const mainBtn = document.getElementById("mainBtn");
      const toggleBtn = document.getElementById("toggleBtn");
      const subtitle = document.getElementById("loginSubtitle");
      
      if(isRegisterMode){
          nameGroup.style.display = "block";
          mainBtn.textContent = "CREAR CUENTA";
          toggleBtn.textContent = "YA TENGO CUENTA";
          subtitle.textContent = "Únete al sistema de gestión EMS";
      } else {
          nameGroup.style.display = "none";
          mainBtn.textContent = "INICIAR SESIÓN";
          toggleBtn.textContent = "CREAR UNA CUENTA";
          subtitle.textContent = "Gestión Documental de Emergencias";
      }
  }

  window.handleAuth = function(){
      if(isRegisterMode) crearUsuario();
      else login();
  }

  window.crearUsuario = function(){
      const email = document.getElementById("emailInput").value.trim();
      const pass = document.getElementById("passwordInput").value.trim();
      const name = document.getElementById("nameInput").value.trim();
      
      if(!email || !pass || !name) return alert("Por favor, completa todos los campos");
      if(pass.length < 6) return alert("La contraseña debe tener al menos 6 caracteres");

      createUserWithEmailAndPassword(auth, email, pass)
          .then((userCredential) => {
              const user = userCredential.user;
              setDoc(doc(collection(db, 'usuarios'), user.uid), {
                  nombre: name,
                  email: email,
                  documentos: {},
                  fechaRegistro: new Date()
              });
          })
          .catch(err => alert("Error: " + err.message));
  }

  window.login = function(){
      const email = document.getElementById("emailInput").value.trim();
      const pass = document.getElementById("passwordInput").value.trim();
      if(!email || !pass) return alert("Ingresa tus credenciales");
      signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Error: " + err.message));
  }

  window.cerrarSesion = function(){
      signOut(auth).then(() => location.reload());
  }

  onAuthStateChanged(auth, user => {
      if (user) {
          currentUser = user;
          iniciarApp();
      } else {
          currentUser = null;
          document.getElementById("login").style.display="flex";
          document.getElementById("app").style.display="none";
      }
  });

  function iniciarApp(){
      document.getElementById("login").style.display="none";
      document.getElementById("app").style.display="block";

      onSnapshot(doc(collection(db, 'usuarios'), currentUser.uid), (docSnap) => {
          if (docSnap.exists()) {
              const userData = docSnap.data();
              const name = userData.nombre || currentUser.email.split('@')[0];
              document.getElementById("nombreUsuario").textContent = name;
              document.getElementById("emailUsuario").textContent = userData.email || currentUser.email;
              document.getElementById("userAvatar").textContent = name.charAt(0).toUpperCase();
              data = userData.documentos || {};
          }
          render();
      });
  }

  // APP LOGIC
  window.render = function(){
      lista.innerHTML="";
      Object.keys(data).forEach(cat=>{
          const catDiv = document.createElement("div");
          catDiv.className = "cat-item";
          
          const header = document.createElement("div");
          header.className = "cat-header" + (cat === categoriaActual ? " active" : "");
          header.innerHTML = `
            <div class="cat-name"><i class="fa-solid ${categoriasAbiertas[cat] ? 'fa-folder-open' : 'fa-folder'}"></i> ${cat}</div>
            <i class="fa-solid fa-chevron-${categoriasAbiertas[cat] ? 'down' : 'right'}" style="font-size:10px"></i>
          `;
          
          header.onclick = () => {
              categoriaActual = cat;
              categoriasAbiertas[cat] = !categoriasAbiertas[cat];
              render();
          };
          
          catDiv.appendChild(header);

          if(categoriasAbiertas[cat]){
              const dList = document.createElement("div");
              dList.className = "doc-list";
              Object.keys(data[cat]).forEach(d => {
                  const dItem = document.createElement("div");
                  dItem.className = "doc-item" + (d === docActual ? " active" : "");
                  dItem.innerHTML = `<i class="fa-solid fa-file-lines"></i> ${d}`;
                  dItem.onclick = (e) => {
                      e.stopPropagation();
                      abrir(cat, d);
                  };
                  dList.appendChild(dItem);
              });
              catDiv.appendChild(dList);
          }
          lista.appendChild(catDiv);
      });
  }

  window.nuevaCategoria = function(){
      const n = prompt("Nombre de la nueva categoría:");
      if(!n || data[n]) return;
      data[n] = {};
      guardarStorage();
  }

  window.nuevoDocumento = function(){
      if(!categoriaActual) return alert("Primero selecciona una categoría");
      const n = prompt("Nombre del nuevo documento:");
      if(!n || data[categoriaActual][n]) return;
      data[categoriaActual][n] = "";
      abrir(categoriaActual, n);
  }

  window.abrir = function(cat, docName){
      categoriaActual = cat;
      docActual = docName;
      editor.style.display = "block";
      editor.contentEditable = "true";
      editor.innerHTML = data[cat][docName] || "";
      document.getElementById("toolbar").style.display = "flex";
      render();
  }

  window.guardar = function(){
      if(!categoriaActual || !docActual) return;
      data[categoriaActual][docActual] = editor.innerHTML;
      guardarStorage();
      alert("Documento guardado con éxito");
  }

  window.eliminar = function(){
      if(!confirm("¿Estás seguro de eliminar este elemento?")) return;
      if(docActual){
          delete data[categoriaActual][docActual];
          docActual = null;
      } else if(categoriaActual){
          delete data[categoriaActual];
          categoriaActual = null;
      }
      editor.style.display = "none";
      document.getElementById("toolbar").style.display = "none";
      guardarStorage();
  }

  function guardarStorage(){
      if (currentUser) {
          setDoc(doc(collection(db, 'usuarios'), currentUser.uid), {
              documentos: data,
              ultimaActualizacion: new Date()
          }, { merge: true });
      }
  }

  window.buscarPorTitulo = function(txt){
      const q = txt.trim().toLowerCase();
      if(!q) return render();
      // Lógica de búsqueda simple
      Object.keys(data).forEach(cat => {
          Object.keys(data[cat]).forEach(d => {
              if(d.toLowerCase().includes(q)) {
                  categoriasAbiertas[cat] = true;
                  abrir(cat, d);
              }
          });
      });
  }

  window.cmd = (c, v = null) => { editor.focus(); document.execCommand(c, false, v); }
  window.insertImage = () => { const url = prompt("URL de la imagen:"); if(url) cmd('insertImage', url); }
  window.setFontSize = (s) => { 
      cmd("fontSize", "7");
      const fonts = editor.getElementsByTagName("font");
      for(let f of fonts) if(f.size == "7") { f.removeAttribute("size"); f.style.fontSize = s + "px"; }
  }

</script>
</body>
</html>
