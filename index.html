<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMS Manual - Sistema de Gestión Documental</title>
<!-- Google Fonts: Inter & Montserrat -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<!-- Font Awesome para iconos -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --primary:#3b82f6;
    --primary-dark:#2563eb;
    --primary-glow:rgba(59,130,246,0.5);
    --bg-body:#0f1419;
    --bg-card:rgba(30,40,60,0.95);
    --bg-sidebar:#1a2332;
    --text-main:#ffffff;
    --text-muted:#b0c4de;
    --border:rgba(255,255,255,0.15);
    --success:#10b981;
    --danger:#ef4444;
    --transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Inter', sans-serif;
    background-color:var(--bg-body);
    color:var(--text-main);
    overflow:hidden;
    height:100vh;
}

/* ===== LOGIN MODERNO ===== */
.login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top right, rgba(59,130,246,0.15), transparent),
                radial-gradient(circle at bottom left, rgba(16,185,129,0.1), transparent);
    position:relative;
}

.login-card{
    background:rgba(30,50,80,0.98);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:2px solid rgba(59,130,246,0.3);
    border-radius:24px;
    width:440px;
    padding:48px;
    box-shadow:0 25px 50px -12px rgba(0,0,0,0.7), 0 0 40px rgba(59,130,246,0.2);
    text-align:center;
    z-index:10;
}

.ems-logo-container{
    width:80px;
    height:80px;
    background:white;
    border-radius:20px;
    margin:0 auto 24px;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 30px var(--primary-glow);
}

.ems-logo-container i{
    font-size:40px;
    color:var(--danger);
}

.login-card h1{
    font-family:'Montserrat', sans-serif;
    font-size:32px;
    margin-bottom:8px;
    background:linear-gradient(to right, #fff, #94a3b8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.login-card p{
    color:var(--text-muted);
    font-size:14px;
    margin-bottom:32px;
}

.input-group{
    margin-bottom:20px;
    text-align:left;
}

.input-group label{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--text-muted);
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.input-wrapper{
    position:relative;
}

.input-wrapper i{
    position:absolute;
    left:16px;
    top:50%;
    transform:translateY(-50%);
    color:var(--text-muted);
}

.input-wrapper input{
    width:100%;
    padding:14px 16px 14px 48px;
    background:rgba(0,0,0,0.3);
    border:1px solid var(--border);
    border-radius:12px;
    color:white;
    font-size:15px;
    transition:var(--transition);
}

.input-wrapper input:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(59,130,246,0.15);
}

.btn-primary{
    width:100%;
    padding:14px;
    background:var(--primary);
    color:white;
    border:none;
    border-radius:12px;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    transition:var(--transition);
    margin-top:10px;
}

.btn-primary:hover{
    background:var(--primary-dark);
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(59,130,246,0.3);
}

.btn-secondary{
    width:100%;
    padding:14px;
    background:transparent;
    color:var(--text-main);
    border:1px solid var(--border);
    border-radius:12px;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:var(--transition);
    margin-top:12px;
}

.btn-secondary:hover{
    background:rgba(255,255,255,0.05);
}

/* ===== APP LAYOUT ===== */
.app-container{
    display:grid;
    grid-template-columns:280px 1fr;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    background:var(--bg-sidebar);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    padding:24px;
}

.app-logo{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:40px;
}

.app-logo i{
    color:var(--danger);
    font-size:24px;
}

.app-logo span{
    font-family:'Montserrat', sans-serif;
    font-weight:800;
    font-size:20px;
    letter-spacing:-0.5px;
}

.nav-section{
    flex:1;
    overflow-y:auto;
}

.nav-section::-webkit-scrollbar{ width:4px; }
.nav-section::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.1); border-radius:10px; }

.sidebar-btn{
    width:100%;
    padding:12px;
    margin-bottom:8px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    font-size:14px;
    transition:var(--transition);
}

.btn-add-cat{ background:rgba(16,185,129,0.1); color:var(--success); }
.btn-add-cat:hover{ background:rgba(16,185,129,0.2); }

.btn-add-doc{ background:rgba(59,130,246,0.1); color:var(--primary); }
.btn-add-doc:hover{ background:rgba(59,130,246,0.2); }

.cat-item{
    margin-bottom:4px;
}

.cat-header{
    padding:10px 12px;
    border-radius:8px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    transition:var(--transition);
}

.cat-header:hover{ background:rgba(255,255,255,0.05); }
.cat-header.active{ background:rgba(59,130,246,0.1); color:var(--primary); }

.cat-name{ font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px; }

.doc-list{ margin-left:24px; margin-top:4px; border-left:1px solid var(--border); padding-left:12px; }

.doc-item{
    padding:8px 12px;
    font-size:13px;
    color:var(--text-muted);
    cursor:pointer;
    border-radius:6px;
    margin-bottom:2px;
    transition:var(--transition);
}

.doc-item:hover{ color:var(--text-main); background:rgba(255,255,255,0.03); }
.doc-item.active{ color:white; background:var(--primary); font-weight:600; }

/* MAIN CONTENT */
.main-content{
    display:flex;
    flex-direction:column;
    background:#0f1419;
}

.top-bar{
    padding:16px 32px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(20,30,50,0.9);
    backdrop-filter:blur(10px);
}

.search-bar{
    position:relative;
    width:400px;
}

.search-bar i{ position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--text-muted); }
.search-bar input{
    width:100%;
    padding:10px 16px 10px 44px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    border-radius:10px;
    color:white;
    font-size:14px;
}

.user-profile{
    display:flex;
    align-items:center;
    gap:12px;
}

.user-meta{ text-align:right; }
.user-meta h4{ font-size:14px; font-weight:700; }
.user-meta p{ font-size:11px; color:var(--text-muted); display:none; }

.avatar{
    cursor:pointer;
    transition:var(--transition);
    width:40px;
    height:40px;
    border-radius:10px;
    background:linear-gradient(45deg, var(--primary), var(--success));
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:800;
    color:white;
    background-size:cover;
    background-position:center;
    font-size:0;
}

.avatar:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px rgba(59,130,246,0.5);
}

.avatar-text{
    font-size:16px;
}

.btn-logout{
    padding:8px;
    color:var(--text-muted);
    cursor:pointer;
    transition:var(--transition);
}

.btn-logout:hover{ color:var(--danger); }

/* EDITOR AREA */
.editor-container{
    flex:1;
    padding:32px;
    display:flex;
    flex-direction:column;
    gap:20px;
    overflow:hidden;
    position:relative;
}

/* WELCOME SCREEN */
.welcome-screen{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center, rgba(59,130,246,0.12) 0%, transparent 70%);
    z-index:5;
    transition:var(--transition);
}

.welcome-content{
    text-align:center;
    animation:fadeInUp 0.8s ease-out;
}

.welcome-logo{
    font-size:120px;
    color:#ef4444;
    margin-bottom:24px;
    opacity:1;
}

.welcome-content h2{
    font-family:'Montserrat', sans-serif;
    font-size:28px;
    color:var(--text-main);
    margin-bottom:12px;
    letter-spacing:1px;
}

.welcome-content p{
    color:var(--text-muted);
    font-size:16px;
    max-width:400px;
    line-height:1.6;
}

@keyframes fadeInUp{
    from{ opacity:0; transform:translateY(20px); }
    to{ opacity:1; transform:translateY(0); }
}

.editor-toolbar{
    background:var(--bg-sidebar);
    padding:12px;
    border-radius:12px;
    border:1px solid var(--border);
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
}

.tool-btn{
    width:36px;
    height:36px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:transparent;
    border:none;
    color:var(--text-muted);
    border-radius:8px;
    cursor:pointer;
    transition:var(--transition);
}

.tool-btn:hover{ background:rgba(255,255,255,0.05); color:white; }

.tool-select{
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    color:white;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
    outline:none;
}

.tool-sep{ width:1px; height:24px; background:var(--border); margin:0 4px; }

.btn-save{ background:var(--success) !important; color:white !important; padding:0 16px !important; width:auto !important; font-weight:700; font-size:12px; }
.btn-delete{ background:rgba(239,68,68,0.1) !important; color:var(--danger) !important; padding:0 16px !important; width:auto !important; font-weight:700; font-size:12px; }

.editor-paper{
    flex:1;
    background:rgba(25,35,55,0.95);
    border-radius:16px;
    border:1px solid rgba(59,130,246,0.2);
    padding:40px;
    overflow-y:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.3), inset 0 0 20px rgba(59,130,246,0.05);
    font-size:16px;
    line-height:1.8;
    outline:none;
}

.editor-paper:empty::before{
    content: 'Comienza a escribir tu documento EMS...';
    color: var(--text-muted);
}

/* RESPONSIVE */
@media (max-width: 1024px) {
    .app-container { grid-template-columns: 1fr; }
    .sidebar { display: none; }
}
</style>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="login" class="login">
    <div class="login-card">
        <div class="ems-logo-container">
            <i class="fa-solid fa-star-of-life"></i>
        </div>
        <h1>EMS Manual</h1>
        <p id="loginSubtitle">Gestión Documental de Emergencias</p>
        
        <div class="input-group">
            <label>Correo Electrónico</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input id="emailInput" type="email" placeholder="nombre@ejemplo.com">
            </div>
        </div>
        
        <div class="input-group">
            <label>Contraseña</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input id="passwordInput" type="password" placeholder="••••••••">
            </div>
        </div>
        
        <div class="input-group" id="nameGroup" style="display:none;">
            <label>Nombre Completo</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input id="nameInput" type="text" placeholder="Tu nombre">
            </div>
        </div>
        
        <button id="mainBtn" class="btn-primary" onclick="handleAuth()">Iniciar Sesión</button>
        <button id="toggleBtn" class="btn-secondary" onclick="toggleRegister()">Crear una cuenta</button>
    </div>
</div>

<!-- APLICACIÓN PRINCIPAL -->
<div id="app" style="display:none">
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="app-logo">
                <i class="fa-solid fa-star-of-life"></i>
                <span>EMS MANUAL</span>
            </div>
            
            <div class="buttons">
                <button class="sidebar-btn btn-add-cat" onclick="nuevaCategoria()">
                    <i class="fa-solid fa-folder-plus"></i> Nueva Categoría
                </button>
                <button class="sidebar-btn btn-add-doc" onclick="nuevoDocumento()">
                    <i class="fa-solid fa-file-circle-plus"></i> Nuevo Documento
                </button>
            </div>
            
            <div class="nav-section" id="lista">
                <!-- Las categorías se cargarán aquí -->
            </div>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Buscar en documentos..." oninput="buscarPorTitulo(this.value)">
                </div>
                
                <div class="user-profile">
                    <div class="user-meta">
                        <h4 id="nombreUsuario" onclick="cambiarNombreUsuario()" style="cursor: pointer; transition: var(--transition);" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'" title="Haz clic para cambiar tu nombre">Usuario</h4>
                        <p id="emailUsuario">usuario@ems.com</p>
                    </div>
                    <div class="avatar" id="userAvatar" onclick="abrirCambiarAvatar()" title="Haz clic para cambiar tu imagen"><span class="avatar-text">U</span></div>
                    <div class="btn-logout" onclick="cerrarSesion()" title="Cerrar Sesión">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </div>
                </div>
            </header>

            <div class="editor-container">
                <!-- Pantalla de Bienvenida -->
                <div id="welcomeScreen" class="welcome-screen">
                    <div class="welcome-content">
                        <div class="welcome-logo">
                            <i class="fa-solid fa-star-of-life"></i>
                        </div>
                        <h2>SISTEMA EMS MANUAL</h2>
                        <p>Selecciona una categoría o crea un nuevo documento para comenzar a gestionar tu información.</p>
                    </div>
                </div>

                <div class="editor-toolbar" id="toolbar" style="display:none">
                    <button class="tool-btn" onclick="cmd('bold')" title="Negrita"><i class="fa-solid fa-bold"></i></button>
                    <button class="tool-btn" onclick="cmd('italic')" title="Cursiva"><i class="fa-solid fa-italic"></i></button>
                    <button class="tool-btn" onclick="cmd('underline')" title="Subrayado"><i class="fa-solid fa-underline"></i></button>
                    
                    <div class="tool-sep"></div>
                    
                    <select class="tool-select" onchange="cmd('fontName', this.value)">
                        <option value="">Fuente</option>
                        <option value="Inter">Inter</option>
                        <option value="Arial">Arial</option>
                        <option value="Calibri">Calibri</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Tahoma">Tahoma</option>
                    </select>
                    
                    <select class="tool-select" onchange="setFontSize(this.value)">
                        <option value="">Tamaño</option>
                        <option value="10">10px</option>
                        <option value="12">12px</option>
                        <option value="14">14px</option>
                        <option value="16">16px</option>
                        <option value="18">18px</option>
                        <option value="24">24px</option>
                        <option value="32">32px</option>
                    </select>
                    
                    <div class="tool-sep"></div>

                    <input type="color" onchange="cmd('foreColor', this.value)" title="Color de texto" style="width:30px; height:30px; border:none; background:transparent; cursor:pointer;">
                    
                    <div class="tool-sep"></div>
                    
                    <button class="tool-btn" onclick="cmd('insertUnorderedList')" title="Lista con viñetas"><i class="fa-solid fa-list-ul"></i></button>
                    <button class="tool-btn" onclick="cmd('insertOrderedList')" title="Lista numerada"><i class="fa-solid fa-list-ol"></i></button>
                    
                    <div class="tool-sep"></div>
                    
                    <button class="tool-btn" onclick="cmd('justifyLeft')"><i class="fa-solid fa-align-left"></i></button>
                    <button class="tool-btn" onclick="cmd('justifyCenter')"><i class="fa-solid fa-align-center"></i></button>
                    <button class="tool-btn" onclick="cmd('justifyRight')"><i class="fa-solid fa-align-right"></i></button>
                    
                    <div class="tool-sep"></div>
                    
                    <button class="tool-btn" onclick="insertImage()"><i class="fa-solid fa-image"></i></button>
                    
                    <div style="flex:1"></div>
                    
                    <button class="sidebar-btn btn-save" onclick="guardar()">
                        <i class="fa-solid fa-floppy-disk"></i> GUARDAR
                    </button>
                    <button class="sidebar-btn btn-delete" onclick="eliminar()">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
                
                <div id="editor" class="editor-paper" contenteditable="false"></div>
            </div>
        </main>
    </div>
</div>

<!-- Firebase SDK v12 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCyhzS4DNTraa0ALKpnncJC85sVA4vvmYQ",
    authDomain: "base-ems.firebaseapp.com",
    projectId: "base-ems",
    storageBucket: "base-ems.firebasestorage.app",
    messagingSenderId: "1029573637298",
    appId: "1:1029573637298:web:58dc8391bda7f1f13f45ab",
    measurementId: "G-SQXQN52J67"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ========= VARIABLES DE ESTADO (RESTAURADAS) =========
  let currentUser = null;
  let data = {};
  let categoriasAbiertas = {};
  let categoriaActual = null;
  let docActual = null;
  let bufferTemporal = {};
  let isRegisterMode = false;
  let userProfileData = {}; // Almacenar datos del perfil (nombre, avatar, etc)

  const lista = document.getElementById("lista");
  const editor = document.getElementById("editor");

  // ========= AUTENTICACIÓN =========
  window.toggleRegister = function(){
      isRegisterMode = !isRegisterMode;
      const nameGroup = document.getElementById("nameGroup");
      const mainBtn = document.getElementById("mainBtn");
      const toggleBtn = document.getElementById("toggleBtn");
      const subtitle = document.getElementById("loginSubtitle");
      
      if(isRegisterMode){
          nameGroup.style.display = "block";
          mainBtn.textContent = "CREAR CUENTA";
          toggleBtn.textContent = "YA TENGO CUENTA";
          subtitle.textContent = "Únete al sistema de gestión EMS";
      } else {
          nameGroup.style.display = "none";
          mainBtn.textContent = "INICIAR SESIÓN";
          toggleBtn.textContent = "CREAR UNA CUENTA";
          subtitle.textContent = "Gestión Documental de Emergencias";
      }
  }

  window.handleAuth = function(){
      if(isRegisterMode) crearUsuario();
      else login();
  }

  window.crearUsuario = function(){
      const email = document.getElementById("emailInput").value.trim();
      const pass = document.getElementById("passwordInput").value.trim();
      const name = document.getElementById("nameInput").value.trim();
      
      if(!email || !pass || !name) return alert("Por favor, completa todos los campos");
      if(pass.length < 6) return alert("La contraseña debe tener al menos 6 caracteres");

      createUserWithEmailAndPassword(auth, email, pass)
          .then((userCredential) => {
              const user = userCredential.user;
              setDoc(doc(collection(db, 'usuarios'), user.uid), {
                  nombre: name,
                  email: email,
                  documentos: {},
                  fechaRegistro: new Date()
              });
          })
          .catch(err => alert("Error: " + err.message));
  }

  window.login = function(){
      const email = document.getElementById("emailInput").value.trim();
      const pass = document.getElementById("passwordInput").value.trim();
      if(!email || !pass) return alert("Ingresa tus credenciales");
      signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Error: " + err.message));
  }

  window.cerrarSesion = function(){
      signOut(auth).then(() => location.reload());
  }

  onAuthStateChanged(auth, user => {
      if (user) {
          currentUser = user;
          iniciarApp();
      } else {
          currentUser = null;
          document.getElementById("login").style.display="flex";
          document.getElementById("app").style.display="none";
      }
  });

  function iniciarApp(){
      document.getElementById("login").style.display="none";
      document.getElementById("app").style.display="block";
      document.getElementById("welcomeScreen").style.display="flex";

      onSnapshot(doc(collection(db, 'usuarios'), currentUser.uid), (docSnap) => {
          if (docSnap.exists()) {
              const userData = docSnap.data();
              userProfileData = {
                  nombre: userData.nombre,
                  email: userData.email,
                  avatarUrl: userData.avatarUrl,
                  fechaRegistro: userData.fechaRegistro
              };
              
              const name = userData.nombre || currentUser.email.split('@')[0];
              document.getElementById("nombreUsuario").textContent = name;
              document.getElementById("emailUsuario").textContent = userData.email || currentUser.email;
              
              const avatarText = document.getElementById("userAvatar").querySelector(".avatar-text"); 
              if(avatarText) avatarText.textContent = name.charAt(0).toUpperCase(); 
              cargarAvatarGuardado(userData);
              
              data = userData.documentos || {};
          }
          render();
      });
  }

  // ========= LÓGICA DE LA APP (RESTAURADA) =========
  window.render = function(){
      lista.innerHTML = "";
      Object.keys(data).forEach(cat=>{
          const catDiv = document.createElement("div");
          catDiv.className = "cat-item";
          
          const header = document.createElement("div");
          header.className = "cat-header" + (cat === categoriaActual ? " active" : "");
          header.innerHTML = `
            <div class="cat-name"><i class="fa-solid ${categoriasAbiertas[cat] ? 'fa-folder-open' : 'fa-folder'}"></i> ${cat}</div>
            <div class="cat-menu" style="display:flex; gap:6px; align-items:center;">
              <button class="cat-menu-btn" onclick="renombrarCategoria('${cat.replace(/'/g, "\\'")}')
" title="Renombrar" style="background:none; border:none; color:var(--text-muted); cursor:pointer; padding:4px 6px; border-radius:4px; transition:var(--transition);" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'" onclick="event.stopPropagation();"><i class="fa-solid fa-pen-to-square" style="font-size:12px"></i></button>
              <button class="cat-menu-btn" onclick="eliminarCategoria('${cat.replace(/'/g, "\\'")}')
" title="Eliminar" style="background:none; border:none; color:var(--text-muted); cursor:pointer; padding:4px 6px; border-radius:4px; transition:var(--transition);" onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--text-muted)'" onclick="event.stopPropagation();"><i class="fa-solid fa-trash" style="font-size:12px"></i></button>
              <i class="fa-solid fa-chevron-${categoriasAbiertas[cat] ? 'down' : 'right'}" style="font-size:10px"></i>
            </div>
          `;
          
          header.onclick = () => {
              categoriaActual = cat;
              docActual = null;
              categoriasAbiertas[cat] = !categoriasAbiertas[cat];
              editor.style.display = "none";
              document.getElementById("toolbar").style.display = "none";
              document.getElementById("welcomeScreen").style.display = "flex";
              render();
          };
          
          catDiv.appendChild(header);

          if(categoriasAbiertas[cat]){
              const dList = document.createElement("div");
              dList.className = "doc-list";
              Object.keys(data[cat]).forEach(d => {
                  const dItem = document.createElement("div");
                  dItem.className = "doc-item" + (d === docActual ? " active" : "");
                  dItem.innerHTML = `<i class="fa-solid fa-file-lines"></i> ${d}`;
                  dItem.onclick = (e) => {
                      e.stopPropagation();
                      abrir(cat, d);
                  };
                  dList.appendChild(dItem);
              });
              catDiv.appendChild(dList);
          }
          lista.appendChild(catDiv);
      });
  }

  window.nuevaCategoria = function(){
      const n = prompt("Nombre de la nueva categoría:");
      if(!n || data[n]) return;
      data[n] = {};
      guardarStorage();
      render();
  }

  window.renombrarCategoria = function(catActual){
      const nuevoNombre = prompt("Nuevo nombre de la categoría:", catActual);
      if(!nuevoNombre || nuevoNombre === catActual || data[nuevoNombre]) return;
      
      // Copiar los documentos a la nueva categoría
      data[nuevoNombre] = data[catActual];
      delete data[catActual];
      
      // Actualizar referencias
      if(categoriaActual === catActual) categoriaActual = nuevoNombre;
      
      guardarStorage();
      render();
      alert("Categoría renombrada correctamente ✔");
  }

  window.eliminarCategoria = function(cat){
      const docCount = Object.keys(data[cat] || {}).length;
      const mensaje = docCount > 0 
          ? `Esta categoría contiene ${docCount} documento(s). ¿Estás seguro de que deseas eliminarla? Esta acción no se puede deshacer.`
          : "¿Estás seguro de que deseas eliminar esta categoría?";
      
      if(!confirm(mensaje)) return;
      
      delete data[cat];
      if(categoriaActual === cat) categoriaActual = null;
      docActual = null;
      
      editor.style.display = "none";
      document.getElementById("toolbar").style.display = "none";
      document.getElementById("welcomeScreen").style.display = "flex";
      
      guardarStorage();
      render();
      alert("Categoría eliminada correctamente ✔");
  }

  window.nuevoDocumento = function(){
      if(!categoriaActual) return alert("Primero selecciona una categoría");
      const n = prompt("Nombre del nuevo documento:");
      if(!n || data[categoriaActual][n]) return;
      data[categoriaActual][n] = "";
      abrir(categoriaActual, n);
  }

  window.abrir = function(cat, docName){
      // Guardar en buffer antes de cambiar
      if(categoriaActual && docActual){
          bufferTemporal[categoriaActual + "||" + docActual] = editor.innerHTML;
      }

      categoriaActual = cat;
      docActual = docName;
      
      // Ocultar bienvenida y mostrar editor
      document.getElementById("welcomeScreen").style.display = "none";
      editor.style.display = "block";
      editor.contentEditable = "true";
      
      const key = cat + "||" + docName;
      editor.innerHTML = bufferTemporal[key] ?? data[cat][docName] ?? "";
      
      document.getElementById("toolbar").style.display = "flex";
      render();
  }

  window.guardar = function(){
      if(categoriaActual && docActual){
          bufferTemporal[categoriaActual + "||" + docActual] = editor.innerHTML;
      }

      // Volcar buffer a data
      for(const key in bufferTemporal){
          const [cat, docName] = key.split("||");
          if(!data[cat]) data[cat] = {};
          data[cat][docName] = bufferTemporal[key];
      }

      bufferTemporal = {};
      guardarStorage();
      alert("Todo guardado correctamente ✔");
  }

  window.eliminar = function(){
      if(!confirm("¿Estás seguro de eliminar este elemento?")) return;
      if(docActual){
          delete data[categoriaActual][docActual];
          docActual = null;
      } else if(categoriaActual){
          delete data[categoriaActual];
          categoriaActual = null;
      }
      editor.style.display="none";
      document.getElementById("toolbar").style.display="none";
      document.getElementById("welcomeScreen").style.display = "flex";
      guardarStorage();
      render();
  }

  function guardarStorage(){
      if (currentUser) {
          setDoc(doc(collection(db, 'usuarios'), currentUser.uid), {
              nombre: userProfileData.nombre,
              email: userProfileData.email,
              avatarUrl: userProfileData.avatarUrl,
              fechaRegistro: userProfileData.fechaRegistro,
              documentos: data,
              ultimaActualizacion: new Date()
          }, { merge: false });
      }
  }

  window.buscarPorTitulo = function(txt){
      const q = txt.trim().toLowerCase();
      if(!q){
          categoriasAbiertas = {};
          editor.style.display = "none";
          document.getElementById("toolbar").style.display = "none";
          render();
          return;
      }

      for(const cat in data){
          for(const docName in data[cat]){
              if(docName.toLowerCase().includes(q)){
                  categoriasAbiertas[cat] = true;
                  abrir(cat, docName);
                  return;
              }
          }
      }
  }

  // ========= COMANDOS DEL EDITOR (RESTAURADOS) =========
  window.cmd = (c, v = null) => { 
      editor.focus(); 
      document.execCommand(c, false, v); 
  }
  
  window.insertImage = () => { 
      const url = prompt("URL de la imagen:"); 
      if(url) cmd('insertImage', url); 
  }
  
  window.setFontSize = (s) => { 
      if(!s) return;
      editor.focus();
      document.execCommand("fontSize", false, "7");
      const fonts = editor.getElementsByTagName("font");
      for(let f of fonts) {
          if(f.size == "7") { 
              f.removeAttribute("size"); 
              f.style.fontSize = s + "px"; 
          }
      }
  }

  // ========= CAMBIAR NOMBRE DE USUARIO =========
  window.cambiarNombreUsuario = function(){
      const nuevoNombre = prompt("Ingresa tu nuevo nombre de usuario:", userProfileData.nombre || "");
      if(!nuevoNombre || nuevoNombre.trim() === "") return;
      
      const nombreLimpio = nuevoNombre.trim();
      
      // Actualizar en memoria
      userProfileData.nombre = nombreLimpio;
      
      // Actualizar en la interfaz
      document.getElementById("nombreUsuario").textContent = nombreLimpio;
      const avatarText = document.getElementById("userAvatar").querySelector(".avatar-text");
      if(avatarText) avatarText.textContent = nombreLimpio.charAt(0).toUpperCase();
      
      // Guardar en Firebase
      if(currentUser){
          setDoc(doc(collection(db, 'usuarios'), currentUser.uid), {
              nombre: nombreLimpio,
              email: userProfileData.email,
              avatarUrl: userProfileData.avatarUrl,
              fechaRegistro: userProfileData.fechaRegistro,
              documentos: data,
              ultimaActualizacion: new Date()
          }, { merge: false }).then(() => {
              alert("Nombre actualizado correctamente ✔");
          }).catch(err => {
              alert("Error al actualizar nombre: " + err.message);
          });
      }
  }

  // ========= CAMBIAR AVATAR =========
  window.abrirCambiarAvatar = function(){
      const modal = document.createElement("div");
      modal.id = "avatarModal";
      modal.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.7);
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 1000;
      `;
      
      const card = document.createElement("div");
      card.style.cssText = `
          background: var(--bg-card);
          border: 1px solid var(--border);
          border-radius: 16px;
          padding: 32px;
          max-width: 500px;
          width: 90%;
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      `;
      
      card.innerHTML = `
          <h2 style="font-family: 'Montserrat', sans-serif; margin-bottom: 20px; color: var(--text-main);">Cambiar Imagen de Perfil</h2>
          <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 14px;">Elige una opcion:</p>
          
          <div style="display: flex; flex-direction: column; gap: 12px;">
              <button id="btnPegar" style="
                  padding: 12px;
                  background: var(--primary);
                  color: white;
                  border: none;
                  border-radius: 8px;
                  cursor: pointer;
                  font-weight: 600;
                  transition: var(--transition);
              " onmouseover="this.style.background='var(--primary-dark)'" onmouseout="this.style.background='var(--primary)'">
                  <i class="fa-solid fa-paste"></i> Pegar desde Portapapeles (Ctrl+V)
              </button>
              
              <button id="btnURL" style="
                  padding: 12px;
                  background: rgba(59, 130, 246, 0.2);
                  color: var(--primary);
                  border: 1px solid var(--primary);
                  border-radius: 8px;
                  cursor: pointer;
                  font-weight: 600;
                  transition: var(--transition);
              " onmouseover="this.style.background='rgba(59, 130, 246, 0.3)'" onmouseout="this.style.background='rgba(59, 130, 246, 0.2)'">
                  <i class="fa-solid fa-link"></i> Usar URL de Imagen
              </button>
              
              <button id="btnCancelar" style="
                  padding: 12px;
                  background: transparent;
                  color: var(--text-muted);
                  border: 1px solid var(--border);
                  border-radius: 8px;
                  cursor: pointer;
                  font-weight: 600;
                  transition: var(--transition);
              " onmouseover="this.style.background='rgba(255, 255, 255, 0.05)'" onmouseout="this.style.background='transparent'">
                  Cancelar
              </button>
          </div>
          
          <div id="pasteArea" style="
              display: none;
              margin-top: 20px;
              padding: 20px;
              background: rgba(255, 255, 255, 0.05);
              border: 2px dashed var(--border);
              border-radius: 8px;
              text-align: center;
              color: var(--text-muted);
              font-size: 14px;
          ">
              <p><i class="fa-solid fa-image" style="font-size: 24px; margin-bottom: 10px; display: block;"></i></p>
              <p>Presiona <strong>Ctrl+V</strong> para pegar tu imagen aqui</p>
          </div>
      `;
      
      modal.appendChild(card);
      document.body.appendChild(modal);
      
      const btnPegar = card.querySelector("#btnPegar");
      const btnURL = card.querySelector("#btnURL");
      const btnCancelar = card.querySelector("#btnCancelar");
      const pasteArea = card.querySelector("#pasteArea");
      
      btnPegar.onclick = () => {
          pasteArea.style.display = "block";
          pasteArea.focus();
          
          const handlePaste = (e) => {
              e.preventDefault();
              const items = e.clipboardData.items;
              
              for(let item of items){
                  if(item.type.indexOf("image") !== -1){
                      const blob = item.getAsFile();
                      const reader = new FileReader();
                      
                      reader.onload = (event) => {
                          const base64 = event.target.result;
                          cambiarAvatarBase64(base64);
                          modal.remove();
                      };
                      
                      reader.readAsDataURL(blob);
                      return;
                  }
              }
              
              alert("No se encontro una imagen en el portapapeles. Por favor, copia una imagen primero.");
          };
          
          document.addEventListener("paste", handlePaste);
          
          const originalRemove = modal.remove.bind(modal);
          modal.remove = function(){
              document.removeEventListener("paste", handlePaste);
              originalRemove();
          };
      };
      
      btnURL.onclick = () => {
          modal.remove();
          const urlImagen = prompt("Pega la URL de tu imagen de perfil:");
          if(urlImagen && urlImagen.trim() !== "") {
              cambiarAvatar(urlImagen.trim());
          }
      };
      
      btnCancelar.onclick = () => modal.remove();
  }

  window.cambiarAvatar = function(urlImagen){
      const avatar = document.getElementById("userAvatar");
      const avatarText = avatar.querySelector(".avatar-text");
      
      // Verificar que la URL sea valida
      const img = new Image();
      img.onload = function(){
          // Si la imagen carga correctamente, actualizar
          avatar.style.backgroundImage = `url('${urlImagen}')`;
          avatarText.style.display = "none";
          
          // Guardar en Firebase
          if(currentUser){
              userProfileData.avatarUrl = urlImagen;
              setDoc(doc(collection(db, 'usuarios'), currentUser.uid), {
                  nombre: userProfileData.nombre,
                  email: userProfileData.email,
                  avatarUrl: urlImagen,
                  fechaRegistro: userProfileData.fechaRegistro,
                  documentos: data,
                  ultimaActualizacion: new Date()
              }, { merge: false });
          }
          
          alert("Imagen de perfil actualizada correctamente ✔");
      };
      img.onerror = function(){
          alert("No se pudo cargar la imagen. Verifica que la URL sea correcta.");
      };
      img.src = urlImagen;
  }

  window.cambiarAvatarBase64 = function(base64){
      const avatar = document.getElementById("userAvatar");
      const avatarText = avatar.querySelector(".avatar-text");
      
      // Actualizar vista previa
      avatar.style.backgroundImage = `url('${base64}')`;
      avatarText.style.display = "none";
      
      // Guardar en Firebase
      if(currentUser){
          userProfileData.avatarUrl = base64;
          setDoc(doc(collection(db, 'usuarios'), currentUser.uid), {
              nombre: userProfileData.nombre,
              email: userProfileData.email,
              avatarUrl: base64,
              fechaRegistro: userProfileData.fechaRegistro,
              documentos: data,
              ultimaActualizacion: new Date()
          }, { merge: false });
      }
      
      alert("Imagen de perfil actualizada desde el portapapeles ✔");
  }

  // Restaurar avatar al cargar datos del usuario
  window.cargarAvatarGuardado = function(userData){
      const avatar = document.getElementById("userAvatar");
      const avatarText = avatar.querySelector(".avatar-text");
      
      if(userData.avatarUrl){
          avatar.style.backgroundImage = `url('${userData.avatarUrl}')`;
          avatarText.style.display = "none";
      } else {
          avatar.style.backgroundImage = "";
          avatarText.style.display = "block";
      }
  }

</script>
</body>
</html>
